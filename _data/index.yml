arbiters:
  title:
    en: <em>Arbiters</em> love it
    fr: Les <em>arbitres</em> l'adorent
  text:
    en: <em>Sharly Chess</em> is built around the needs of tournament arbiters, helping you stay organized and efficient even in high-pressure settings.
    fr: <em>Sharly Chess</em> est conçu autour des besoins des arbitres de tournois, pour vous aider à rester organisé·e et efficace, même sous pression.
  items:
    -
      title:
        en: Player management
        fr: Gestion des joueur·euses
      text:
        en: All your players in one place, with easy search and filtering.
        fr: Tous vos joueur·euses au même endroit, avec recherche et filtres faciles.
    -
      title:
        en: Check-ins
        fr: Pointage
      text:
        en: Check players in yourself, or have players check themselves in.
        fr: Faites le pointage vous-même ou laissez les joueur·euses s’auto-enregistrer.
    -
      title:
        en: Pairings
        fr: Appariements
      text:
        en:  Automated, FIDE compliant, and easy to adjust on the fly.
        fr: Automatisés, respectant les règles de la FIDE, et faciles à ajuster à la volée.
    -
      title:
        en: Live standings
        fr: Classements en direct
      text:
        en: Results are available instantly after each round.
        fr: Les résultats sont disponibles immédiatement après chaque ronde.
    -
      title:
        en: Offline solution
        fr: Fonctionnement hors ligne
      text:
        en: Run tournaments without an internet connection.
        fr: Organisez un tournoi même sans connexion Internet.
    -
      title:
        en: Focus on arbitration
        fr: Plus de temps pour arbitrer
      text:
        en: Players can enter their own results while you manage the tournament.
        fr: Les joueur·euses peuvent entrer leurs résultats en autonomie, vous pouvez vous concentrer sur les parties.
  image:
    name: arbiters.jpg
    class: screenshot sepia
players:
  title:
    en: <em>Players</em> love it
    fr: Les <em>joueur·euses</em> l'adorent
  text:
    en: <em>Sharly Chess</em> improves the tournament experience for everyone. Players can find their pairings quickly and submit results with ease.
    fr: <em>Sharly Chess</em> améliore l’expérience des tournois pour tout le monde. Les joueur·euses trouvent facilement leurs appariements et peuvent saisir leurs résultats en un clin d’œil.
  items:
    -
      title:
        en: Digital result input
        fr: Saisie des résultats en ligne
      text:
        en: Less waiting between rounds since the arbiter doesn’t have to enter every result.
        fr: Moins d’attente entre les rondes puisque l’arbitre n’a pas à entrer chaque résultat.
    -
      title:
        en: On-screen pairings
        fr: Appariements projetés
      text:
        en: Players instantly see their board and opponent.
        fr: Les joueur·euses voient immédiatement leur table et leur adversaire.
  images:
    -
      name: players-1.jpg
    -
      name: players-2.jpg
